name: Blog Registry Auto-Sync

on:
  push:
    branches:
      - main
    paths:
      - 'public/blog/**'

permissions:
  contents: write

jobs:
  sync-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Blog Sync Script
        run: npx tsx scripts/sync-blog.ts

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated blog registry update"
          file_pattern: 'src/data/blog-posts.json'
          branch: main
